<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>היומן הבריאותי שלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f0e8;--card:#fffdf8;--text:#2c2416;--sub:#7a6e5f;
    --accent:#c0392b;--accent2:#e67e22;--green:#27ae60;
    --blue:#2980b9;--purple:#8e44ad;--border:#e0d8cc;
    --shadow:0 4px 20px rgba(0,0,0,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px}
  header{background:var(--text);color:#f5f0e8;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2)}
  header h1{font-size:1.4rem;font-weight:900}
  header .date-display{font-size:0.9rem;opacity:0.7}
  .bell-btn{background:var(--accent);border:none;color:white;width:40px;height:40px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;flex-shrink:0}
  .bell-btn:hover{transform:scale(1.1)}
  nav{display:flex;background:var(--card);border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none;position:sticky;top:65px;z-index:99}
  nav::-webkit-scrollbar{display:none}
  .nav-btn{flex:none;padding:14px 16px;border:none;background:none;color:var(--sub);font-family:'Heebo',sans-serif;font-size:0.9rem;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
  .nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:700}
  .nav-btn:hover{color:var(--text);background:var(--bg)}
  .section{display:none;padding:20px 16px;max-width:700px;margin:0 auto}
  .section.active{display:block}
  .card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
  .card-title{font-size:1.1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .form-row{margin-bottom:12px}
  label{display:block;font-size:0.9rem;color:var(--sub);margin-bottom:5px;font-weight:500}
  input,select,textarea{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:10px;font-family:'Heebo',sans-serif;font-size:1rem;color:var(--text);background:white;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:70px;resize:vertical}
  .btn{padding:12px 22px;border:none;border-radius:10px;font-family:'Heebo',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:7px}
  .btn-primary{background:var(--accent);color:white}
  .btn-primary:hover{background:#a93226;transform:translateY(-1px)}
  .btn-green{background:var(--green);color:white}
  .btn-blue{background:var(--blue);color:white}
  .btn-danger{background:#e74c3c;color:white;font-size:.85rem;padding:6px 12px}
  .btn-sm{padding:7px 14px;font-size:.85rem}
  .btn-nav{background:#f0f0f0;color:var(--text)}
  .list-item{display:flex;align-items:flex-start;justify-content:space-between;padding:14px;background:white;border-radius:12px;margin-bottom:10px;border:1px solid var(--border);transition:box-shadow .2s}
  .list-item:hover{box-shadow:0 2px 12px rgba(0,0,0,.1)}
  .list-item-info{flex:1}
  .list-item-title{font-weight:700;font-size:1rem;margin-bottom:4px}
  .list-item-sub{font-size:.87rem;color:var(--sub);margin-top:3px}
  .list-item-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-right:10px}
  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.78rem;font-weight:700;margin-top:4px}
  .tag-red{background:#fde8e8;color:var(--accent)}
  .tag-orange{background:#fef3e2;color:var(--accent2)}
  .tag-green{background:#e8f8ee;color:var(--green)}
  .tag-blue{background:#e3f2fd;color:var(--blue)}
  .tag-purple{background:#f3e8fd;color:var(--purple)}
  .bp-display{display:flex;gap:16px;align-items:center;margin-bottom:16px}
  .bp-num{text-align:center;background:white;border-radius:14px;padding:14px 22px;flex:1;border:2px solid var(--border)}
  .bp-num .val{font-size:2.2rem;font-weight:900;line-height:1}
  .bp-num .lbl{font-size:.8rem;color:var(--sub);margin-top:4px}
  .bp-slash{font-size:2rem;color:var(--sub)}
  .task-check{width:26px;height:26px;border:2px solid var(--border);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;margin-left:12px;transition:all .2s;background:white}
  .task-check.done{background:var(--green);border-color:var(--green);color:white}
  .task-done-text{text-decoration:line-through;opacity:.5}
  .reminder-item{display:flex;align-items:center;gap:12px;padding:14px;background:#fff8f0;border:2px solid #f0d9b0;border-radius:12px;margin-bottom:10px}
  .reminder-time{font-size:1.4rem;font-weight:900;color:var(--accent2);min-width:70px;text-align:center}
  .reminder-active{border-color:var(--green);background:#f0fff4}
  .reminder-active .reminder-time{color:var(--green)}
  .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-left:6px}
  .dot-green{background:var(--green)}.dot-red{background:var(--accent)}.dot-orange{background:var(--accent2)}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
  .stat-card{background:white;border-radius:14px;padding:16px;text-align:center;border:2px solid var(--border)}
  .stat-num{font-size:2rem;font-weight:900}
  .stat-lbl{font-size:.82rem;color:var(--sub);margin-top:4px}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:var(--card);border-radius:20px;padding:28px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center}
  .modal-icon{font-size:3.5rem;margin-bottom:12px}
  .modal h2{font-size:1.4rem;margin-bottom:8px}
  .modal p{color:var(--sub);margin-bottom:20px;font-size:1rem}
  .check-row{display:flex;align-items:center;gap:10px;margin-top:10px;cursor:pointer}
  .check-row input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--accent)}
  .time-slots{display:grid;gap:8px;margin-top:8px}
  .time-slot{display:flex;align-items:center;gap:10px}
  .time-slot label{min-width:80px;margin:0}
  .pills-warning{display:none;border-radius:12px;padding:14px 16px;margin-bottom:12px;font-size:.95rem;border:2px solid}
  .pills-warning.show{display:block}
  .pills-warning.warn{background:#fff3cd;border-color:#ffc107}
  .pills-warning.crit{background:#fde8e8;border-color:var(--accent);font-weight:700}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .pills-warning.crit{animation:pulse 1s infinite}
  .pill-overlay{display:none;position:fixed;inset:0;background:rgba(192,57,43,.96);z-index:2000;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:30px;color:white}
  .pill-overlay.show{display:flex}
  .pill-overlay h2{font-size:2rem;margin-bottom:16px}
  .pill-overlay p{font-size:1.1rem;margin-bottom:24px;line-height:1.7}
  .permission-banner{background:#fff3cd;border:2px solid #ffc107;border-radius:12px;padding:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:.92rem}
  .empty{text-align:center;padding:40px 20px;color:var(--sub)}
  .empty-icon{font-size:3rem;margin-bottom:12px}
  .sub-panel{background:#f9f6f0;border-radius:12px;padding:14px;margin-bottom:12px;border:1px solid var(--border)}
  .sub-panel-blue{background:#f0f7ff;border:1px solid #b3d4f5}
  @keyframes ring{0%,100%{transform:rotate(0)}20%{transform:rotate(-15deg)}40%{transform:rotate(15deg)}60%{transform:rotate(-10deg)}80%{transform:rotate(10deg)}}
  .ringing{animation:ring .5s infinite}
  @media(max-width:480px){header h1{font-size:1.1rem}.nav-btn{padding:12px 10px;font-size:.82rem}.bp-num .val{font-size:1.8rem}}
</style>
</head>
<body>

<!-- CRITICAL PILL OVERLAY -->
<div class="pill-overlay" id="pillOverlay">
  <div style="font-size:4rem;margin-bottom:16px">💊🚨</div>
  <h2>נגמרות התרופות!</h2>
  <p id="pillOverlayText"></p>
  <button class="btn" style="background:white;color:var(--accent);font-size:1.1rem" onclick="closePillOverlay()">הבנתי, אקנה בקרוב</button>
</div>

<header>
  <div>
    <h1>📋 היומן הבריאותי שלי</h1>
    <div class="date-display" id="headerDate"></div>
  </div>
  <button class="bell-btn" onclick="checkAlarms()" title="בדוק תזכורות">🔔</button>
</header>

<nav>
  <button class="nav-btn active" onclick="showSection('dashboard')">🏠 ראשי</button>
  <button class="nav-btn" onclick="showSection('meds')">💊 תרופות</button>
  <button class="nav-btn" onclick="showSection('bp')">❤️ לחץ דם</button>
  <button class="nav-btn" onclick="showSection('appointments')">📅 פגישות</button>
  <button class="nav-btn" onclick="showSection('tasks')">✅ משימות</button>
  <button class="nav-btn" onclick="showSection('reminders')">⏰ תזכורות</button>
</nav>

<!-- DASHBOARD -->
<div class="section active" id="dashboard">
  <div class="card" style="background:linear-gradient(135deg,#2c2416,#5a3e28);color:white;border:none">
    <div style="font-size:2rem;margin-bottom:8px">☀️</div>
    <div id="greetingText" style="font-size:1.3rem;font-weight:700"></div>
    <div id="todayDate" style="opacity:.7;margin-top:4px;font-size:.9rem"></div>
  </div>
  <div id="pillsWarnDash"></div>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="card">
    <div class="card-title">⏰ תזכורות להיום</div>
    <div id="todayRemindersList"></div>
  </div>
  <div class="card">
    <div class="card-title">📅 פגישה קרובה</div>
    <div id="nextAppContent"></div>
  </div>
</div>

<!-- MEDICATIONS -->
<div class="section" id="meds">
  <div id="pillsWarnMeds"></div>
  <div class="card">
    <div class="card-title">💊 הוסף תרופה</div>

    <div class="form-row">
      <label>שם התרופה</label>
      <input type="text" id="medName" placeholder="למשל: אספירין">
    </div>
    <div class="form-row">
      <label>מינון</label>
      <input type="text" id="medDose" placeholder="למשל: 100 מ״ג">
    </div>

    <div class="form-row">
      <label>תדירות</label>
      <select id="medFreq" onchange="updateFreqUI()">
        <option value="daily1">כל יום — פעם אחת</option>
        <option value="daily2">כל יום — פעמיים ביום</option>
        <option value="daily3">כל יום — שלוש פעמים ביום</option>
        <option value="other">אחר...</option>
      </select>
    </div>

    <div id="timeSlots" class="form-row"></div>

    <div id="otherFreqPanel" class="sub-panel" style="display:none">
      <div class="form-row">
        <label>סוג תדירות</label>
        <select id="otherFreqType" onchange="updateOtherFreq()">
          <option value="once">חד פעמי</option>
          <option value="2week">פעמיים בשבוע</option>
          <option value="1week">פעם בשבוע</option>
          <option value="3week">שלוש פעמים בשבוע</option>
        </select>
      </div>
      <div id="otherFreqTimes"></div>
    </div>

    <div class="form-row">
      <div class="check-row">
        <input type="checkbox" id="medTimeLimited" onchange="document.getElementById('timeLimitedPanel').style.display=this.checked?'block':'none'">
        <span>לתקופת זמן מוגדרת (למשל אנטיביוטיקה)</span>
      </div>
    </div>
    <div id="timeLimitedPanel" class="sub-panel sub-panel-blue" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-row" style="margin:0"><label>מתאריך</label><input type="date" id="medFrom"></div>
        <div class="form-row" style="margin:0"><label>עד תאריך</label><input type="date" id="medTo"></div>
      </div>
    </div>

    <div class="sub-panel" style="margin-bottom:12px">
      <label>📦 מעקב כמות כדורים בחבילה <span style="font-weight:400;font-size:.85rem;">(אופציונלי)</span></label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
        <div><label>כמות בחבילה</label><input type="number" id="medPillsTotal" placeholder="30" min="1"></div>
        <div><label>כדורים בכל נטילה</label><input type="number" id="medPillsPerDose" placeholder="1" min="1"></div>
      </div>
    </div>

    <div class="form-row">
      <label>הערות</label>
      <textarea id="medNotes" placeholder="למשל: לקחת עם אוכל"></textarea>
    </div>

    <div class="check-row" style="margin-bottom:16px">
      <input type="checkbox" id="medAlertWanted">
      <span>🔔 רצוני לקבל התראה בשעת הנטילה</span>
    </div>

    <button class="btn btn-primary" onclick="addMed()">➕ הוסף תרופה</button>
  </div>
  <div id="medsList"></div>
</div>

<!-- BLOOD PRESSURE -->
<div class="section" id="bp">
  <div class="card">
    <div class="card-title">❤️ רשום מדידה חדשה</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="form-row" style="margin:0"><label>סיסטולי (עליון)</label><input type="number" id="bpSys" placeholder="120" min="60" max="220"></div>
      <div class="form-row" style="margin:0"><label>דיאסטולי (תחתון)</label><input type="number" id="bpDia" placeholder="80" min="40" max="140"></div>
      <div class="form-row" style="margin:0"><label>דופק</label><input type="number" id="bpPulse" placeholder="72"></div>
    </div>
    <div class="form-row"><label>הערות</label><input type="text" id="bpNotes" placeholder="למשל: אחרי מנוחה"></div>
    <button class="btn btn-primary" onclick="addBP()">📊 שמור מדידה</button>
  </div>
  <div id="bpList"></div>
</div>

<!-- APPOINTMENTS -->
<div class="section" id="appointments">
  <div class="card">
    <div class="card-title">📅 הוסף פגישה</div>
    <div class="form-row"><label>כותרת הפגישה</label><input type="text" id="appTitle" placeholder="למשל: ד״ר כהן — קרדיולוג"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-row"><label>תאריך</label><input type="date" id="appDate"></div>
      <div class="form-row"><label>שעה</label><input type="time" id="appTime"></div>
    </div>
    <div class="form-row"><label>מיקום / כתובת</label><input type="text" id="appLocation" placeholder="למשל: רחוב הרצל 5, תל אביב"></div>
    <div class="form-row">
      <label>סוג פגישה</label>
      <select id="appType" onchange="document.getElementById('customTypePanel').style.display=this.value==='אחר'?'block':'none'">
        <option value="רופא">🩺 רופא</option>
        <option value="בדיקות">🧪 בדיקות דם/מעבדה</option>
        <option value="התנדבות">🤝 התנדבות</option>
        <option value="שיעור תורה">📖 שיעור תורה</option>
        <option value="משפחה">👨‍👩‍👧 משפחה</option>
        <option value="אחר">✏️ אחר (הגדר בעצמך)</option>
      </select>
    </div>
    <div id="customTypePanel" class="form-row" style="display:none"><label>הגדר סוג פגישה</label><input type="text" id="customType" placeholder="למשל: מספרה, ספורט..."></div>
    <div class="form-row"><label>הערות</label><textarea id="appNotes" placeholder="מה להביא, שאלות לרופא..."></textarea></div>

    <div class="sub-panel" style="margin-bottom:14px">
      <div class="check-row">
        <input type="checkbox" id="appAlertWanted" onchange="document.getElementById('appAlertPanel').style.display=this.checked?'block':'none'">
        <span>🔔 רצוני תזכורת לפני הפגישה</span>
      </div>
      <div id="appAlertPanel" style="display:none;margin-top:10px">
        <label>כמה זמן מראש?</label>
        <select id="appAlertBefore" onchange="document.getElementById('customAlertPanel').style.display=this.value==='custom'?'block':'none'">
          <option value="1440">יום לפני (24 שעות)</option>
          <option value="2880">יומיים לפני</option>
          <option value="60">שעה לפני</option>
          <option value="30">חצי שעה לפני</option>
          <option value="20">20 דקות לפני</option>
          <option value="custom">התאם אישית</option>
        </select>
        <div id="customAlertPanel" style="display:none;margin-top:8px">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
            <div><label>מספר</label><input type="number" id="customAlertNum" placeholder="2" min="1"></div>
            <div><label>יחידה</label><select id="customAlertUnit"><option value="60">שעות</option><option value="1440">ימים</option></select></div>
          </div>
        </div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="addApp()">➕ הוסף פגישה</button>
  </div>
  <div id="appList"></div>
</div>

<!-- TASKS -->
<div class="section" id="tasks">
  <div class="card">
    <div class="card-title">✅ הוסף משימה</div>
    <div class="form-row"><label>תיאור המשימה</label><input type="text" id="taskText" placeholder="למשל: לקנות תרופות בבית מרקחת"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-row"><label>עד מתי</label><input type="date" id="taskDue"></div>
      <div class="form-row"><label>עדיפות</label>
        <select id="taskPriority"><option value="גבוהה">🔴 גבוהה</option><option value="בינונית" selected>🟡 בינונית</option><option value="נמוכה">🟢 נמוכה</option></select>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addTask()">➕ הוסף משימה</button>
  </div>
  <div id="taskList"></div>
</div>

<!-- REMINDERS -->
<div class="section" id="reminders">
  <div class="permission-banner" id="permBanner" style="display:none">
    <span style="font-size:1.5rem">🔔</span>
    <div><strong>אפשר התראות לקבל תזכורות!</strong><br>
    <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="requestNotifPerm()">אפשר התראות</button></div>
  </div>
  <div class="card">
    <div class="card-title">⏰ הוסף תזכורת</div>
    <div class="form-row"><label>כותרת</label><input type="text" id="remTitle" placeholder="למשל: לקחת תרופת בוקר"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-row"><label>תאריך</label><input type="date" id="remDate"></div>
      <div class="form-row"><label>שעה</label><input type="time" id="remTime"></div>
    </div>
    <div class="form-row"><label>חזרה</label>
      <select id="remRepeat"><option value="once">חד פעמי</option><option value="daily">כל יום</option><option value="weekly">כל שבוע</option></select>
    </div>
    <button class="btn btn-primary" onclick="addReminder()">➕ הוסף תזכורת</button>
  </div>
  <div id="reminderList"></div>
</div>

<!-- ALARM MODAL -->
<div class="modal-overlay" id="alarmModal">
  <div class="modal">
    <div class="modal-icon ringing">⏰</div>
    <h2 id="alarmTitle">תזכורת!</h2>
    <p id="alarmBody"></p>
    <div id="alarmMedActions" style="display:none;margin-bottom:12px">
      <button class="btn btn-green" style="width:100%;justify-content:center;margin-bottom:8px" onclick="confirmMedTaken()">✅ לקחתי את התרופה</button>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="dismissAlarm()">הבנתי, תודה!</button>
  </div>
</div>

<script>
const DB={
  get(k){try{return JSON.parse(localStorage.getItem(k))||[]}catch{return[]}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v))}
};
let currentAlarmMedId=null;

window.onload=()=>{
  updateDateTime();
  setInterval(updateDateTime,60000);
  setInterval(checkAlarms,30000);
  const today=new Date().toISOString().split('T')[0];
  ['appDate','remDate','taskDue','medFrom','medTo'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=today});
  updateFreqUI();
  checkNotifPermission();
  renderAll();
  checkPillsWarnings();
};

function updateDateTime(){
  const now=new Date();
  const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const mn=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const s=`יום ${days[now.getDay()]}, ${now.getDate()} ב${mn[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('headerDate').textContent=s;
  document.getElementById('todayDate').textContent=s;
  const h=now.getHours();
  document.getElementById('greetingText').textContent=h<12?'בוקר טוב ☀️':h<17?'צהריים טובים 🌤️':h<21?'ערב טוב 🌙':'לילה טוב ✨';
}

function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  ['dashboard','meds','bp','appointments','tasks','reminders'].forEach((s,i)=>{
    if(s===id)document.querySelectorAll('.nav-btn')[i].classList.add('active');
  });
  if(id==='dashboard')renderDashboard();
  if(id==='meds')checkPillsWarnings();
}

function renderAll(){renderDashboard();renderMeds();renderBP();renderApps();renderTasks();renderReminders();}

// DASHBOARD
function renderDashboard(){
  const meds=DB.get('meds'),bps=DB.get('bp'),apps=DB.get('appointments'),tasks=DB.get('tasks'),rems=DB.get('reminders');
  const today=new Date().toISOString().split('T')[0];
  const mn=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const lastBP=bps[0];
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-num" style="color:var(--accent)">${meds.length}</div><div class="stat-lbl">💊 תרופות</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--blue)">${apps.filter(a=>a.date===today).length}</div><div class="stat-lbl">📅 פגישות היום</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${tasks.filter(t=>!t.done).length}</div><div class="stat-lbl">✅ משימות פתוחות</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--purple)">${lastBP?lastBP.sys+'/'+lastBP.dia:'—'}</div><div class="stat-lbl">❤️ לחץ דם אחרון</div></div>`;
  const todayR=rems.filter(r=>r.date===today||r.repeat==='daily'||(r.repeat==='weekly'&&isSameDow(r.date,today)));
  document.getElementById('todayRemindersList').innerHTML=todayR.length?
    todayR.map(r=>`<div style="display:flex;align-items:center;gap:10px;padding:10px;background:#fff8f0;border-radius:10px;margin-bottom:8px;border:1px solid #f0d9b0"><span style="font-size:1.4rem;font-weight:900;color:var(--accent2)">${r.time}</span><span>${r.title}</span></div>`).join(''):
    '<div style="color:var(--sub);font-size:.9rem">אין תזכורות להיום</div>';
  const upcoming=apps.filter(a=>a.date>=today).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const nx=upcoming[0];
  document.getElementById('nextAppContent').innerHTML=nx?`
    <div style="font-size:1.1rem;font-weight:700">${nx.title}</div>
    <div style="color:var(--sub);margin-top:6px">📅 ${new Date(nx.date).getDate()} ב${mn[new Date(nx.date).getMonth()]}${nx.time?' • 🕐 '+nx.time:''}</div>
    ${nx.location?`<div style="color:var(--sub);margin-top:4px">📍 ${nx.location}</div>`:''}`:
    '<div style="color:var(--sub)">אין פגישות קרובות</div>';
  document.getElementById('pillsWarnDash').innerHTML=getPillsWarningHTML();
}

// PILLS
function getPillsWarnings(){
  return DB.get('meds').filter(m=>m.pillsTotal>0).map(m=>{
    const rem=m.pillsRemaining??m.pillsTotal;
    const dpd=(m.dosesPerDay||1)*(m.pillsPerDose||1);
    const days=Math.floor(rem/dpd);
    return{m,rem,days};
  }).filter(w=>w.days<=4);
}
function getPillsWarningHTML(){
  return getPillsWarnings().map(({m,rem,days})=>{
    const crit=days<=1;
    return `<div class="pills-warning show ${crit?'crit':'warn'}">${crit?'🚨':'⚠️'} <strong>${m.name}</strong> — נשארו <strong>${rem}</strong> כדורים (עוד <strong>${days}</strong> ימים). ${crit?'קנה בדחיפות!':'כדאי לקנות בקרוב.'}</div>`;
  }).join('');
}
function checkPillsWarnings(){
  const el=document.getElementById('pillsWarnMeds');
  if(el)el.innerHTML=getPillsWarningHTML();
  const crits=getPillsWarnings().filter(w=>w.days<=1);
  if(crits.length){
    document.getElementById('pillOverlayText').innerHTML=crits.map(({m,rem,days})=>`<strong>${m.name}</strong>: נשארו ${rem} כדורים — עוד ${days} יום בלבד!`).join('<br>');
    document.getElementById('pillOverlay').classList.add('show');
  }
}
function closePillOverlay(){document.getElementById('pillOverlay').classList.remove('show')}

// FREQ UI
function updateFreqUI(){
  const v=document.getElementById('medFreq').value;
  const slots=document.getElementById('timeSlots');
  const other=document.getElementById('otherFreqPanel');
  if(v==='other'){slots.innerHTML='';other.style.display='block';updateOtherFreq();}
  else{
    other.style.display='none';
    const c=v==='daily2'?2:v==='daily3'?3:1;
    slots.innerHTML=`<label>שעת נטילה${c>1?' ('+c+' זמנים)':''}</label><div class="time-slots">`+
      Array.from({length:c},(_,i)=>`<div class="time-slot"><label>${['ראשונה','שניה','שלישית'][i]}</label><input type="time" id="mTime${i}"></div>`).join('')+'</div>';
  }
}
function updateOtherFreq(){
  const t=document.getElementById('otherFreqType').value;
  const c=t==='2week'?2:t==='3week'?3:1;
  const p=document.getElementById('otherFreqTimes');
  p.innerHTML=`<label style="display:block;margin-top:8px">שעות נטילה</label><div class="time-slots">`+
    Array.from({length:c},(_,i)=>`<div class="time-slot"><label>${['ראשונה','שניה','שלישית'][i]}</label><input type="time" id="oTime${i}"></div>`).join('')+'</div>'+
    (t==='once'?`<div class="form-row" style="margin-top:8px"><label>תאריך</label><input type="date" id="oDate" value="${new Date().toISOString().split('T')[0]}"></div>`:'');
}
function getMedTimes(){
  const v=document.getElementById('medFreq').value;
  if(v==='other'){
    const t=document.getElementById('otherFreqType').value;
    const c=t==='2week'?2:t==='3week'?3:1;
    return Array.from({length:c},(_,i)=>document.getElementById('oTime'+i)?.value||'').filter(Boolean);
  }
  const c=v==='daily2'?2:v==='daily3'?3:1;
  return Array.from({length:c},(_,i)=>document.getElementById('mTime'+i)?.value||'').filter(Boolean);
}

// MEDS
function addMed(){
  const name=document.getElementById('medName').value.trim();
  if(!name)return alert('נא להזין שם תרופה');
  const dose=document.getElementById('medDose').value.trim();
  const v=document.getElementById('medFreq').value;
  const times=getMedTimes();
  const notes=document.getElementById('medNotes').value.trim();
  const pillsTotal=parseInt(document.getElementById('medPillsTotal').value)||0;
  const pillsPerDose=parseInt(document.getElementById('medPillsPerDose').value)||1;
  const alertWanted=document.getElementById('medAlertWanted').checked;
  const timeLimited=document.getElementById('medTimeLimited').checked;
  const medFrom=timeLimited?document.getElementById('medFrom').value:'';
  const medTo=timeLimited?document.getElementById('medTo').value:'';
  let freqLabel='כל יום',dosesPerDay=1;
  if(v==='daily2'){freqLabel='כל יום פעמיים';dosesPerDay=2}
  else if(v==='daily3'){freqLabel='כל יום שלוש פעמים';dosesPerDay=3}
  else if(v==='other'){
    const t=document.getElementById('otherFreqType').value;
    const lbl={once:'חד פעמי','2week':'פעמיים בשבוע','1week':'פעם בשבוע','3week':'שלוש פעמים בשבוע'};
    freqLabel=lbl[t];dosesPerDay=t==='2week'?2:t==='3week'?3:1;
  }
  const meds=DB.get('meds');
  meds.unshift({id:Date.now(),name,dose,freq:freqLabel,times,notes,pillsTotal,pillsPerDose,pillsRemaining:pillsTotal,dosesPerDay,alertWanted,timeLimited,medFrom,medTo});
  DB.set('meds',meds);
  ['medName','medDose','medNotes','medPillsTotal','medPillsPerDose'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('medTimeLimited').checked=false;
  document.getElementById('timeLimitedPanel').style.display='none';
  document.getElementById('medAlertWanted').checked=false;
  updateFreqUI();renderMeds();checkPillsWarnings();
}

function markMedTaken(id){
  const meds=DB.get('meds');const m=meds.find(m=>m.id===id);
  if(m&&m.pillsRemaining>0)m.pillsRemaining-=m.pillsPerDose;
  DB.set('meds',meds);renderMeds();checkPillsWarnings();
}

function renderMeds(){
  const meds=DB.get('meds');const div=document.getElementById('medsList');
  if(!meds.length){div.innerHTML='<div class="empty"><div class="empty-icon">💊</div><div>עדיין לא נוספו תרופות</div></div>';return}
  div.innerHTML=meds.map(m=>{
    const rem=m.pillsRemaining??m.pillsTotal;
    const dpd=(m.dosesPerDay||1)*(m.pillsPerDose||1);
    const daysLeft=m.pillsTotal?Math.floor(rem/dpd):null;
    const pillsHTML=m.pillsTotal?`<div style="margin-top:8px;background:#f9f6f0;border-radius:8px;padding:8px 12px;font-size:.87rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>📦 נשארו <strong>${rem}</strong> כדורים ${daysLeft!==null?`(עוד <strong style="color:${daysLeft<=1?'var(--accent)':daysLeft<=4?'var(--accent2)':'var(--green)'}">${daysLeft} ימים</strong>)`:''}</span>
      <button class="btn btn-sm btn-green" style="padding:5px 12px;font-size:.82rem" onclick="markMedTaken(${m.id})">✓ לקחתי</button></div>`:'';
    return`<div class="list-item" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div class="list-item-info">
          <div class="list-item-title">💊 ${m.name}${m.dose?' — '+m.dose:''}</div>
          <div class="list-item-sub">${m.freq}</div>
          ${m.times?.length?`<div class="list-item-sub">🕐 ${m.times.join(' | ')}</div>`:''}
          ${m.timeLimited&&m.medFrom?`<div class="list-item-sub">📆 ${m.medFrom} — ${m.medTo}</div>`:''}
          ${m.notes?`<div class="list-item-sub">📝 ${m.notes}</div>`:''}
          ${m.alertWanted?'<span class="tag tag-orange" style="margin-top:6px">🔔 עם התראה</span>':''}
        </div>
        <button class="btn btn-danger btn-sm" onclick="delItem('meds','${m.id}',()=>{renderMeds();checkPillsWarnings();})">🗑️</button>
      </div>${pillsHTML}</div>`;
  }).join('');
}

// BLOOD PRESSURE
function getBPStatus(sys,dia){
  if(sys<100||dia<60)return{label:'נמוך מדי',cls:'tag-blue',color:'var(--blue)',advice:'עלול לגרום לסחרחורת — שב לנוח ושתה מים'};
  if(sys<=125&&dia<=80)return{label:'מצוין ✓',cls:'tag-green',color:'var(--green)',advice:'לחץ דם אידיאלי — כל הכבוד!'};
  if(sys<=139&&dia<=89)return{label:'נורמלי',cls:'tag-green',color:'var(--green)',advice:'טווח תקין לחלוטין'};
  if(sys<=159&&dia<=99)return{label:'גבוה — שלב 1',cls:'tag-orange',color:'var(--accent2)',advice:'דורש מעקב ושינוי אורח חיים'};
  return{label:'גבוה מאוד ⚠️',cls:'tag-red',color:'var(--accent)',advice:'מצריך התערבות רפואית — פנה לרופא!'};
}

function addBP(){
  const sys=parseInt(document.getElementById('bpSys').value);
  const dia=parseInt(document.getElementById('bpDia').value);
  const pulse=document.getElementById('bpPulse').value;
  const notes=document.getElementById('bpNotes').value.trim();
  if(!sys||!dia)return alert('נא להזין ערכי לחץ דם');
  const status=getBPStatus(sys,dia);
  const now=new Date();
  const bps=DB.get('bp');
  bps.unshift({id:Date.now(),sys,dia,pulse,notes,status,
    datetime:now.toLocaleDateString('he-IL')+' '+now.toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})});
  DB.set('bp',bps);
  ['bpSys','bpDia','bpPulse','bpNotes'].forEach(id=>document.getElementById(id).value='');
  renderBP();
}

    <div class="bp-display">
      <div class="bp-num"><div class="val" style="color:${last.status.color}">${last.sys}</div><div class="lbl">סיסטולי (עליון)</div></div>
      <div class="bp-slash">/</div>
      <div class="bp-num"><div class="val" style="color:${last.status.color}">${last.dia}</div><div class="lbl">דיאסטולי (תחתון)</div></div>
      ${last.pulse?`<div class="bp-num"><div class="val" style="color:var(--accent2)">${last.pulse}</div><div class="lbl">דופק</div></div>`:''}
    </div>
    <span class="tag ${last.status.cls}" style="font-size:1rem;padding:6px 16px">${last.status.label}</span>

  </div>
  <div class="card"><div class="card-title">📋 היסטוריה</div>
  ${bps.slice(0,15).map(b=>`
    <div class="list-item">
      <div class="list-item-info">
        <div style="display:flex;align-items:center;gap:12px">

          <div>
            <span class="tag ${b.status.cls}">${b.status.label}</span>

            <div style="font-size:.78rem;color:#aaa;margin-top:2px">${b.status.advice}</div>

// APPOINTMENTS
function addApp(){
  const title=document.getElementById('appTitle').value.trim();
  const date=document.getElementById('appDate').value;
  const time=document.getElementById('appTime').value;
  const location=document.getElementById('appLocation').value.trim();
  let type=document.getElementById('appType').value;
  if(type==='אחר'){type=document.getElementById('customType').value.trim()||'אחר';}
  const notes=document.getElementById('appNotes').value.trim();
  const alertWanted=document.getElementById('appAlertWanted').checked;
  let alertMinutes=0;
  if(alertWanted){
    const v=document.getElementById('appAlertBefore').value;
    alertMinutes=v==='custom'?(parseInt(document.getElementById('customAlertNum').value)||1)*(parseInt(document.getElementById('customAlertUnit').value)||60):parseInt(v);
  }
  if(!title||!date)return alert('נא להזין כותרת ותאריך');
  const apps=DB.get('appointments');
  apps.push({id:Date.now(),title,date,time,location,type,notes,alertWanted,alertMinutes});
  apps.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  DB.set('appointments',apps);
  ['appTitle','appTime','appLocation','appNotes','customType'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('appAlertWanted').checked=false;
  document.getElementById('appAlertPanel').style.display='none';
  document.getElementById('customTypePanel').style.display='none';
  renderApps();
}

function renderApps(){
  const apps=DB.get('appointments');const div=document.getElementById('appList');
  if(!apps.length){div.innerHTML='<div class="empty"><div class="empty-icon">📅</div><div>עדיין לא נוספו פגישות</div></div>';return}
  const today=new Date().toISOString().split('T')[0];
  const mn=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const emoji={'רופא':'🩺','בדיקות':'🧪','התנדבות':'🤝','שיעור תורה':'📖','משפחה':'👨‍👩‍👧'};
  const rg=(list,title)=>list.length===0?'':`<div class="card"><div class="card-title">${title}</div>${list.map(a=>{
    const d=new Date(a.date);
    const nav=a.location?`<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <a href="https://waze.com/ul?q=${encodeURIComponent(a.location)}" target="_blank" class="btn btn-sm btn-blue">🗺️ Waze</a>
      <a href="https://maps.google.com/?q=${encodeURIComponent(a.location)}" target="_blank" class="btn btn-sm btn-nav">📍 Google Maps</a></div>`:'';
    return`<div class="list-item" style="${a.date<today?'opacity:.65':''}flex-direction:column;align-items:stretch">
      <div style="display:flex;justify-content:space-between">
        <div class="list-item-info">
          <div class="list-item-title">${emoji[a.type]||'📌'} ${a.title}</div>
          <div class="list-item-sub">📅 ${d.getDate()} ב${mn[d.getMonth()]} ${d.getFullYear()}${a.time?' • 🕐 '+a.time:''}</div>
          ${a.location?`<div class="list-item-sub">📍 ${a.location}</div>`:''}
          ${a.notes?`<div class="list-item-sub">📝 ${a.notes}</div>`:''}
          ${a.alertWanted?`<span class="tag tag-orange">🔔 תזכורת ${a.alertMinutes>=1440?Math.floor(a.alertMinutes/1440)+' ימים':a.alertMinutes+' דקות'} לפני</span>`:''}
        </div>
        <button class="btn btn-danger btn-sm" onclick="delItem('appointments','${a.id}',renderApps)">🗑️</button>
      </div>${nav}</div>`;
  }).join('')}</div>`;
  div.innerHTML=rg(apps.filter(a=>a.date>=today),'📆 פגישות קרובות')+rg(apps.filter(a=>a.date<today),'🗂️ פגישות שעברו');
}

// TASKS
function addTask(){
  const text=document.getElementById('taskText').value.trim();
  if(!text)return alert('נא להזין תיאור משימה');
  const tasks=DB.get('tasks');
  tasks.unshift({id:Date.now(),text,due:document.getElementById('taskDue').value,priority:document.getElementById('taskPriority').value,done:false});
  DB.set('tasks',tasks);document.getElementById('taskText').value='';renderTasks();
}
function toggleTask(id){const t=DB.get('tasks');const i=t.find(x=>x.id===id);if(i)i.done=!i.done;DB.set('tasks',t);renderTasks();}
function renderTasks(){
  const tasks=DB.get('tasks');const div=document.getElementById('taskList');
  if(!tasks.length){div.innerHTML='<div class="empty"><div class="empty-icon">✅</div><div>אין משימות כרגע</div></div>';return}
  const pc={'גבוהה':'tag-red','בינונית':'tag-orange','נמוכה':'tag-green'};
  const rl=(list,title)=>list.length===0?'':`<div class="card"><div class="card-title">${title}</div>${list.map(t=>`
    <div class="list-item" style="align-items:center">
      <div onclick="toggleTask(${t.id})" class="task-check ${t.done?'done':''}">${t.done?'✓':''}</div>
      <div class="list-item-info">
        <div class="list-item-title ${t.done?'task-done-text':''}">${t.text}</div>
        <div style="display:flex;gap:8px;margin-top:5px;flex-wrap:wrap">
          <span class="tag ${pc[t.priority]}">${t.priority}</span>
          ${t.due?`<span class="tag tag-blue">עד ${new Date(t.due).toLocaleDateString('he-IL')}</span>`:''}
        </div>
      </div>
      <button class="btn btn-danger btn-sm" onclick="delItem('tasks','${t.id}',renderTasks)">🗑️</button>
    </div>`).join('')}</div>`;
  div.innerHTML=rl(tasks.filter(t=>!t.done),'📋 משימות פתוחות')+rl(tasks.filter(t=>t.done),'✅ הושלמו');
}

// REMINDERS
function addReminder(){
  const title=document.getElementById('remTitle').value.trim();
  const time=document.getElementById('remTime').value;
  if(!title||!time)return alert('נא להזין כותרת ושעה');
  const rems=DB.get('reminders');
  rems.push({id:Date.now(),title,date:document.getElementById('remDate').value,time,repeat:document.getElementById('remRepeat').value,active:true});
  DB.set('reminders',rems);['remTitle','remTime'].forEach(id=>document.getElementById(id).value='');renderReminders();
}
function toggleReminder(id){const r=DB.get('reminders');const i=r.find(x=>x.id===id);if(i)i.active=!i.active;DB.set('reminders',r);renderReminders();}
function renderReminders(){
  const rems=DB.get('reminders');const div=document.getElementById('reminderList');
  if(!rems.length){div.innerHTML='<div class="empty"><div class="empty-icon">⏰</div><div>עדיין לא נוספו תזכורות</div></div>';return}
  const rl={once:'חד פעמי',daily:'כל יום',weekly:'כל שבוע'};
  div.innerHTML=rems.map(r=>`
    <div class="reminder-item ${r.active?'reminder-active':''}">
      <div class="reminder-time">${r.time}</div>
      <div style="flex:1">
        <div style="font-weight:700">${r.title}</div>
        <div style="font-size:.82rem;color:var(--sub);margin-top:3px">
          ${r.date?new Date(r.date).toLocaleDateString('he-IL')+' • ':''}${rl[r.repeat]}
          <span class="status-dot ${r.active?'dot-green':'dot-red'}"></span>${r.active?'פעיל':'כבוי'}
        </div>
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" style="background:${r.active?'#fde8e8':'#e8f8ee'};color:${r.active?'var(--accent)':'var(--green)'}" onclick="toggleReminder(${r.id})">${r.active?'⏸️':'▶️'}</button>
        <button class="btn btn-danger btn-sm" onclick="delItem('reminders','${r.id}',renderReminders)">🗑️</button>
      </div>
    </div>`).join('');
}

// ALARMS
function checkAlarms(){
  const now=new Date(),today=now.toISOString().split('T')[0];
  const t=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  DB.get('reminders').forEach(r=>{
    if(!r.active)return;
    if((r.repeat==='daily'||r.date===today||(r.repeat==='weekly'&&isSameDow(r.date,today)))&&r.time===t)
      fireAlarm('⏰ '+r.title,'תזכורת: '+r.time,null);
  });
  DB.get('meds').forEach(m=>{
    if(!m.alertWanted||!m.times)return;
    m.times.forEach(mt=>{if(mt===t)fireAlarm('💊 זמן לתרופה','לא לשכוח: '+m.name+(m.dose?' '+m.dose:''),m.id);});
  });
}

function fireAlarm(title,body,medId){
  document.getElementById('alarmTitle').textContent=title;
  document.getElementById('alarmBody').textContent=body;
  document.getElementById('alarmMedActions').style.display=medId?'block':'none';
  currentAlarmMedId=medId;
  document.getElementById('alarmModal').classList.add('open');
  playAlarmSound();
  if(Notification.permission==='granted')new Notification(title,{body});
}
function confirmMedTaken(){if(currentAlarmMedId)markMedTaken(currentAlarmMedId);dismissAlarm();}
function dismissAlarm(){document.getElementById('alarmModal').classList.remove('open');}
function playAlarmSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,.3,.6,.9,1.2].forEach(s=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=880;o.type='sine';
      g.gain.setValueAtTime(.4,ctx.currentTime+s);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+s+.25);
      o.start(ctx.currentTime+s);o.stop(ctx.currentTime+s+.25);
    });
  }catch(e){}
}

// NOTIF
function checkNotifPermission(){if('Notification' in window&&Notification.permission==='default')document.getElementById('permBanner').style.display='flex';}
function requestNotifPerm(){Notification.requestPermission().then(p=>{if(p==='granted'){document.getElementById('permBanner').style.display='none';new Notification('✅ מצוין!',{body:'ההתראות הופעלו!'});}});}

// UTILS
function isSameDow(d1,d2){return new Date(d1).getDay()===new Date(d2).getDay();}
function delItem(key,id,cb){
  if(!confirm('בטוח למחוק?'))return;
  DB.set(key,DB.get(key).filter(i=>String(i.id)!==String(id)));
  cb();renderDashboard();
}
</script>
